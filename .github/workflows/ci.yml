name: CI Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check
        run: |
          find . -name "*.py" -print0 | xargs -0 python -m py_compile

      - name: Validate JSON
        run: |
          for f in locales/*/*.json; do
            python -m json.tool "$f" > /dev/null
          done
